<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - SalonEase</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <h2>SalonEase</h2>
      <p>Beauty & Care</p>
    </div>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="about.html">About Us</a>
      <a href="contact.html">Contact</a>
    </div>

    <div id="userMenu" class="nav-buttons"></div>
  </nav>

  <section class="form-section">
    <div class="form-box">
      <h1>Contact Us</h1>
      <p>Send your message or feedback to SalonEase.</p>

      <form id="contactForm">
        <label>Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label>Message</label>
        <textarea id="messageText" placeholder="Write your message" required></textarea>

        <button type="submit" class="btn-dark full-btn">Send Message</button>
      </form>

      <p id="message" class="message"></p>
    </div>
  </section>

  <footer>
    <p>© 2026 SalonEase. All rights reserved.</p>
  </footer>

  <script src="js/api.js"></script>
  <script>
    const contactForm = document.getElementById("contactForm");
    const message = document.getElementById("message");

    contactForm.addEventListener("submit", function(event) {
      event.preventDefault();
      message.textContent = "Your message has been saved for review.";
      contactForm.reset();
    });
  </script>

</body>
</html>
