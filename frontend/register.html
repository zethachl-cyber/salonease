<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - SalonEase</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <h2>SalonEase</h2>
      <p>Beauty & Care</p>
    </div>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="#">About Us</a>
      <a href="#">Contact</a>
    </div>

    <div class="nav-buttons">
      <a href="login.html" class="btn-outline">Login</a>
      <a href="register.html" class="btn-dark">Register</a>
    </div>
  </nav>

  <section class="form-section">
    <div class="form-box">
      <h1>Create Account</h1>
      <p>Join SalonEase and book your favorite salon service easily.</p>

      <form id="registerForm">
        <label>Full Name</label>
        <input type="text" id="full_name" placeholder="Enter your full name" required>

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label>Phone Number</label>
        <input type="text" id="phone_number" placeholder="Enter your phone number">

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <button type="submit" class="btn-dark full-btn">Register</button>
      </form>

      <p id="message" class="message"></p>

      <p class="form-link">
        Already have an account? <a href="login.html">Login here</a>
      </p>
    </div>
  </section>

  <script src="js/api.js"></script>
  <script>
    const registerForm = document.getElementById("registerForm");
    const message = document.getElementById("message");

    registerForm.addEventListener("submit", async function(event) {
      event.preventDefault();

      const data = {
        full_name: document.getElementById("full_name").value,
        email: document.getElementById("email").value,
        phone_number: document.getElementById("phone_number").value,
        password: document.getElementById("password").value
      };

      try {
        const response = await fetch(`${API_BASE_URL}/api/register`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();
message.textContent = result.error ? `${result.message}: ${result.error}` : result.message;
        if (response.ok) {
          registerForm.reset();
        }
      } catch (error) {
        message.textContent = "Registration failed. Please try again.";
      }
    });
  </script>

</body>
</html>
