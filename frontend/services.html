<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Services - SalonEase</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <h2>SalonEase</h2>
      <p>Beauty & Care</p>
    </div>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="about.html">About Us</a>
      <a href="contact.html">Contact</a>
    </div>

    <div id="userMenu" class="nav-buttons"></div>
  </nav>

  <section class="page-header">
    <h1>Our Services</h1>
    <p>Search and choose the best salon service for your appointment.</p>
  </section>

  <section class="filter-box">
    <input type="text" id="searchInput" placeholder="Search service name...">

    <select id="priceFilter">
      <option value="all">All Prices</option>
      <option value="75000">Under Rp 75.000</option>
      <option value="100000">Under Rp 100.000</option>
      <option value="150000">Under Rp 150.000</option>
    </select>
  </section>

  <section class="section">
    <div id="servicesList" class="service-grid"></div>
  </section>

  <footer>
    <p>© 2026 SalonEase. All rights reserved.</p>
  </footer>

  <script src="js/api.js"></script>
  <script>
    const servicesList = document.getElementById("servicesList");
    const searchInput = document.getElementById("searchInput");
    const priceFilter = document.getElementById("priceFilter");

    let allServices = [];

    function renderServices() {
      const keyword = searchInput.value.toLowerCase();
      const maxPrice = priceFilter.value;

      let filteredServices = allServices.filter(service => {
        const nameMatch = service.service_name.toLowerCase().includes(keyword);
        const priceMatch = maxPrice === "all" || Number(service.price) <= Number(maxPrice);
        return nameMatch && priceMatch;
      });

      if (filteredServices.length === 0) {
        servicesList.innerHTML = "<p>No service found.</p>";
        return;
      }

      servicesList.innerHTML = "";

      filteredServices.forEach(service => {
        servicesList.innerHTML += `
          <div class="service-card">
            <span class="badge">${service.duration} minutes</span>
            <h3>${service.service_name}</h3>
            <p>${service.description}</p>
            <p class="price">${formatRupiah(service.price)}</p>
            <a href="booking.html?service_id=${service.service_id}" class="btn-dark">Book This Service</a>
          </div>
        `;
      });
    }

    fetch(`${API_BASE_URL}/api/services`)
      .then(response => response.json())
      .then(services => {
        allServices = services;
        renderServices();
      })
      .catch(() => {
        servicesList.innerHTML = "<p>Failed to load services.</p>";
      });

    searchInput.addEventListener("input", renderServices);
    priceFilter.addEventListener("change", renderServices);
  </script>

</body>
</html>
